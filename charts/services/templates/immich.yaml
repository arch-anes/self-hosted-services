{{- if (include "app.enabled" (list . "immich")) }}
{{- include "app.require" (list . "Immich" "postgresql" "PostgreSQL") -}}
{{- include "app.require" (list . "Immich" "redis" "Redis") -}}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  storageClassName: local-path-persistent-namespaced
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-generated-data
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  storageClassName: local-path-persistent-namespaced
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: immich
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: oci://oci.trueforge.org/truecharts/immich
  version: 33.0.11
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/trueforge-org/truecharts/blob/master/charts/stable/immich/values.yaml
  values:
    immich:
    {{- $mlGpuVendor := dig "machine_learning" "gpu_vendor" "" .Values.applications.immich }}
    {{- if eq $mlGpuVendor "nvidia" }}
      {{- if not (include "app.enabled" (list . "nvidia_gpu")) }}
        {{- fail "NVIDIA GPU is selected for Immich's machine learning but nvidia_gpu is not enabled" }}
      {{- end }}
      mlImageType: mlCudaImage
    {{- else if eq $mlGpuVendor "amd" }}
      {{- if not (include "app.enabled" (list . "amd_gpu")) }}
        {{- fail "AMD GPU is selected for Immich's machine learning but amd_gpu is not enabled" }}
      {{- end }}
      mlImageType: mlRocmImage
    {{- else if $mlGpuVendor }}
      {{- fail (printf "Unknown GPU vendor '%s' selected for Immich's machine learning" $mlGpuVendor) }}
    {{- else }}
      mlImageType: mlOpenvinoImage
    {{- end }}
    workload:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        podSpec:
          annotations:
            backup.velero.io/backup-volumes: uploads
          nodeSelector:
            # Schedule only on NAS nodes
            nas: "true"
          containers:
            main:
              env:
                DB_VECTOR_EXTENSION: vectorchord
                DB_PASSWORD:
                  secretKeyRef:
                    name: postgresql-pguser-immich
                    key: password
                    expandObjectName: false
                DB_URL: postgresql://immich:$(DB_PASSWORD)@postgresql-primary:5432/immich?sslmode=verify-full&sslrootcert=/etc/postgres/tls/ca.crt&sslcert=/etc/postgres/tls/tls.crt&sslkey=/etc/postgres/tls/tls.key
                REDIS_PASSWORD:
                  secretKeyRef:
                    name: redis
                    key: redis-password
                    expandObjectName: false
                {{- if (include "metrics.enabled" .) }}
                IMMICH_TELEMETRY_INCLUDE: all
                {{- end }}
      microservices:
        annotations:
          reloader.stakater.com/auto: "true"
        podSpec:
          nodeSelector:
            # Schedule only on NAS nodes
            nas: "true"
          containers:
            microservices:
              env:
                DB_VECTOR_EXTENSION: vectorchord
                DB_PASSWORD:
                  secretKeyRef:
                    name: postgresql-pguser-immich
                    key: password
                    expandObjectName: false
                DB_URL: postgresql://immich:$(DB_PASSWORD)@postgresql-primary:5432/immich?sslmode=verify-full&sslrootcert=/etc/postgres/tls/ca.crt&sslcert=/etc/postgres/tls/tls.crt&sslkey=/etc/postgres/tls/tls.key
                REDIS_PASSWORD:
                  secretKeyRef:
                    name: redis
                    key: redis-password
                    expandObjectName: false
                {{- if (include "metrics.enabled" .) }}
                IMMICH_TELEMETRY_INCLUDE: all
                {{- end }}
              resources:
                requests:
                  memory: 1Gi
                  cpu: 250m
                limits:
                  cpu: null
                  memory: 4Gi
                  {{- include "gpu.device" (list . "Immich" .Values.applications.immich.gpu_vendor) | nindent 18 }}
      machinelearning:
        annotations:
          reloader.stakater.com/auto: "true"
        podSpec:
          containers:
            machinelearning:
              env:
                MACHINE_LEARNING_PRELOAD__CLIP__TEXTUAL: "ViT-SO400M-16-SigLIP2-384__webli"
              resources:
                excludeExtra: false
                requests:
                  memory: 1Gi
                  cpu: 250m
                limits:
                  cpu: null
                  memory: 10Gi
                  {{- include "gpu.device" (list . "Immich's machine learning" $mlGpuVendor) | nindent 18 }}
    service:
      main:
        ports:
          metrics:
            enabled: {{ include "metrics.enabled" . }}
            port: 8081
            protocol: http
            targetSelector: main
      microservices:
        ports:
          metrics:
            enabled: {{ include "metrics.enabled" . }}
            port: 8082
            protocol: http
            targetSelector: microservices
    resources:
      requests:
        memory: 128Mi
        cpu: 1000m
      limits:
        cpu: null
        memory: 2Gi
    global:
      traefik:
        fixedMiddlewares: []
    ingress:
      main:
        enabled: true
        annotations:
          homer.service.name: Media
          homer.item.name: immich
          homer.item.logo: "https://raw.githubusercontent.com/immich-app/immich/3bcb4b7af7b903cf6d2df6933b6ad092b12296ce/design/immich-logo.svg"
        hosts:
          - host: immich.{{ .Values.fqdn }}
            paths:
              - path: /
        tls:
          - secretName: "{{ .Values.fqdn }}-tls"
            hosts:
              - immich.{{ .Values.fqdn }}
    redis:
      enabled: false
      creds:
        plainhost: redis-master
    cnpg:
      main:
        enabled: false
        database: immich
        user: immich
        creds:
          host: postgresql-primary
    persistence:
      postgresql-certs:
        enabled: true
        type: secret
        objectName: postgresql-cluster-cert
        expandObjectName: false
        mountPath: /etc/postgres/tls
        readOnly: true
        defaultMode: "0400"
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      generated-data:
        enabled: true
        type: pvc
        existingClaim: immich-generated-data
        mountPath: /usr/src/app/upload
        targetSelector:
          # Main pod/container is server
          main:
            main: {}
          microservices:
            microservices: {}
      uploads:
        type: pvc
        existingClaim: immich
      mlcache:
        type: pvc
        storageClass: local-path-ephemeral
      # No need to split the folders under different volume
      backups:
        enabled: false
      video:
        enabled: false
      library:
        enabled: false
      profile:
        enabled: false
      thumbs:
        enabled: false
    metrics:
      main:
        enabled: {{ include "metrics.enabled" . }}
        type: servicemonitor
        targetSelector: main
        endpoints:
          - port: metrics
            path: /metrics
      microservices:
        enabled: {{ include "metrics.enabled" . }}
        type: servicemonitor
        targetSelector: microservices
        endpoints:
          - port: metrics
            path: /metrics
    configmap:
      authentik-blueprint:
        enabled: {{ and (include "app.enabled" (list . "immich")) (not .Values.applications.immich.trusted_header_auth) }}
        data:
          blueprint.yaml: |
            # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
            version: 1
            metadata:
              name: Immich OAuth2 Provider
            entries:
              - id: immich-provider
                model: authentik_providers_oauth2.oauth2provider
                identifiers:
                  name: Provider for immich
                attrs:
                  grant_types:
                    - authorization_code
                    - refresh_token
                  authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                  invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
                  client_type: confidential
                  redirect_uris:
                    - matching_mode: strict
                      url: "https://immich.{{ .Values.fqdn }}/auth/login"
                    - matching_mode: strict
                      url: "https://immich.{{ .Values.fqdn }}/user-settings"
                    - matching_mode: strict
                      url: "app.immich:///oauth-callback"
                  signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                  client_id: !File /blueprints/mounted/secret-immich/client_id
                  client_secret: !File /blueprints/mounted/secret-immich/client_secret
                  property_mappings:
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
              - id: immich-app
                model: authentik_core.application
                identifiers:
                  slug: immich
                attrs:
                  name: immich
                  provider: !KeyOf immich-provider
                  policy_engine_mode: any
    extraTpl:
      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: immich
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          refreshPolicy: CreatedOnce
          target:
            creationPolicy: Owner
            deletionPolicy: Retain
            name: immich
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_id
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: huge-alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_secret
      - apiVersion: batch/v1
        kind: CronJob
        metadata:
          name: immich-vchordrq-prewarm
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          schedule: "*/5 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistoryLimit: 1
          failedJobsHistoryLimit: 3
          jobTemplate:
            spec:
              template:
                spec:
                  restartPolicy: OnFailure
                  nodeSelector:
                    kubernetes.io/arch: amd64
                  containers:
                    - name: prewarm
                      image: ghcr.io/arch-anes/crunchy-postgres:ubi9-17.9-2610
                      command:
                        - psql
                        - -c
                        - "SELECT vchordrq_prewarm('clip_index'), vchordrq_prewarm('face_index');"
                      env:
                        - name: PGPASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: postgresql-pguser-immich
                              key: password
                        - name: PGHOST
                          value: postgresql-primary
                        - name: PGPORT
                          value: "5432"
                        - name: PGDATABASE
                          value: immich
                        - name: PGUSER
                          value: immich
                        - name: PGSSLMODE
                          value: require
                      resources:
                        requests:
                          cpu: 10m
                          memory: 32Mi
                        limits:
                          memory: 64Mi
{{- end }}
