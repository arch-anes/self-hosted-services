{{- if (include "app.enabled" (list . "transmission")) }}
{{- include "app.require" (list . "Transmission" "gluetun" "Gluetun" ) -}}
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: transmission
#   namespace: "{{ .Values.applicationsNamespace }}"
# type: Opaque
# stringData:
#   username: "someuser"
#   password: "somepass"

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: transmission
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: oci://oci.trueforge.org/truecharts/transmission
  version: 25.6.2
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/trueforge-org/truecharts/blob/master/charts/stable/transmission/values.yaml
  values:
    {{- include "tunnel.truecharts.image" . | nindent 4 }}
    configmap:
      scripts:
        enabled: true
        data:
          stuck-cleaner.sh: |
            #!/bin/bash
            set -euo pipefail

            USERNAME=$(cat /secrets/transmission/username)
            PASSWORD=$(cat /secrets/transmission/password)
            tr() { transmission-remote -n "$USERNAME:$PASSWORD" "$@"; }

            THRESHOLD_STUCK_SECONDS=3600
            NOW=$(date +%s)

            tr -t all -i | awk '
              $0 == "NAME" { if (NR > 1) print id "\t" name "\t" percent "\t" activity; id=name=percent=activity="" }
              /^  Id:/ { id=$0; sub(/^  Id:[[:space:]]*/, "", id) }
              /^  Name:/ { name=$0; sub(/^  Name:[[:space:]]*/, "", name) }
              /^  Percent Done:/ { percent=$0; sub(/^  Percent Done:[[:space:]]*/, "", percent); sub(/%$/, "", percent) }
              /^  Latest activity:/ { activity=$0; sub(/^  Latest activity:[[:space:]]*/, "", activity) }
              END { if (NR > 0) print id "\t" name "\t" percent "\t" activity }
            ' | while IFS=$'\t' read -r id name percent activity; do
                [ "$percent" = "100" ] && continue
                [ -n "$activity" ] || continue
                activity_sec=$(date -d "$activity" +%s 2>/dev/null) || continue
                age=$(( NOW - activity_sec ))
                [ "$age" -ge "$THRESHOLD_STUCK_SECONDS" ] || continue
                echo "Removing stuck torrent '$name' at $percent% (no activity for $((age/60)) minutes)"
                tr -t "$id" --remove-and-delete
              done
    workload:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        podSpec:
          annotations:
            backup.velero.io/backup-volumes: config
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/instance
                        operator: In
                        values:
                          - jellyfin
                  topologyKey: "kubernetes.io/hostname"
          containers:
            {{- include "tunnel.truecharts.container" . | nindent 12 }}
            main:
              env:
                FILE__USER: /secrets/transmission/username
                FILE__PASS: /secrets/transmission/password
    resources:
      requests:
        memory: 128Mi
        cpu: 1000m
      limits:
        memory: 2Gi
        cpu: null
    global:
      traefik:
        fixedMiddlewares: []
    ingress:
      main:
        enabled: true
        annotations:
          homer.service.name: Media
          homer.item.logo: "https://raw.githubusercontent.com/transmission/transmission/0ce4adf07ce4b6cfabf81e2d027f96197bb9a305/web/assets/img/logo.png"
        hosts:
          - host: transmission.{{ .Values.fqdn }}
            paths:
              - path: /
        tls:
          - secretName: "{{ .Values.fqdn }}-tls"
            hosts:
              - transmission.{{ .Values.fqdn }}
    persistence:
      config:
        type: pvc
        storageClass: local-path-persistent-namespaced
      downloads:
        enabled: true
        type: pvc
        existingClaim: multimedia
        subPath: Downloads
        mountPath: /downloads
      transmission-secret:
        enabled: true
        type: secret
        objectName: transmission
        expandObjectName: false
        mountPath: /secrets/transmission
        readOnly: true
      cleaner-script:
        enabled: true
        type: configmap
        objectName: scripts
        mountPath: /etc/periodic/15min/stuck-cleaner.sh
        subPath: stuck-cleaner.sh
        defaultMode: "0755"
{{- end }}
