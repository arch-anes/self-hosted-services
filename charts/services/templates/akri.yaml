{{- if and .Values.primaryTenant (not .Values.disableAllApplications) .Values.applications.akri.enabled }}
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: akri
  namespace: kube-system
spec:
  chart: akri
  repo: https://project-akri.github.io/akri/
  version: 0.13.8
  targetNamespace: kube-system
  # default-values: https://github.com/project-akri/akri/blob/v0.13.8/deployment/helm/values.yaml
  values:
    useLatestContainers: true
    useDevelopmentContainers: false
    udev:
      discovery:
        enabled: true
        resources:
          cpuLimit: null
      configuration:
        enabled: true
        capacity: 5
        discoveryDetails:
          udevRules:
            {{- range .Values.applications.akri.udevRules }}
            - {{ . | quote }}
            {{- end }}
    prometheus:
      enabled: {{ include "metrics.enabled" . }}
{{- end }}
