{{- if (include "app.enabled" (list . "lazylibrarian")) }}
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: lazylibrarian
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: oci://oci.trueforge.org/truecharts/lazylibrarian
  version: 22.3.0
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/trueforge-org/truecharts/blob/master/charts/stable/lazylibrarian/values.yaml
  values:
    workload:
      main:
        podSpec:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/instance
                        operator: In
                        values:
                          - jellyfin
                  topologyKey: "kubernetes.io/hostname"
          annotations:
            backup.velero.io/backup-volumes: data
          containers:
            main:
              fixedEnv:
                PUID: "1000"
                PGID: "1000"
    resources:
      requests:
        memory: 512Mi
        cpu: 1000m
      limits:
        memory: 1Gi
        cpu: null
    persistence:
      config:
        enabled: true
        mountPath: "/config"
        type: pvc
        storageClass: local-path-persistent-namespaced
        size: 1Gi
      multimedia:
        enabled: true
        type: pvc
        mountPath: "/multimedia"
        existingClaim: multimedia
    ingress:
      main:
        enabled: true
        annotations:
          homer.service.name: Arr
          homer.item.logo: "https://lazylibrarian.gitlab.io/logo.svg"
        hosts:
          - host: lib.{{ .Values.fqdn }}
            paths:
              - path: /
        tls:
          - secretName: "{{ .Values.fqdn }}-tls"
            hosts:
              - lib.{{ .Values.fqdn }}
{{- end }}
