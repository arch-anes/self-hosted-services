{{- if and (not .Values.disableAllApplications) .Values.applications.netbox.enabled }}
{{- if not .Values.applications.postgresql.enabled }}
{{- fail "netbox requires PostgreSQL to be enabled. Please enable PostgreSQL in your values.yaml" }}
{{- end }}
{{- if not .Values.applications.redis.enabled }}
{{- fail "netbox requires Redis to be enabled. Please enable Redis in your values.yaml" }}
{{- end }}

# If you're getting this error: Cannot assign "<netbox.config.Config object at 0x7cdf56da31d0>": "User.config" must be a "UserConfig" instance.
# run the following command: https://github.com/netbox-community/netbox/discussions/8718#discussioncomment-2228523
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: netbox
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: netbox
  repo: https://charts.netbox.oss.netboxlabs.com
  version: 7.2.11
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/netbox-community/netbox-chart/blob/main/charts/netbox/values.yaml
  values:
    loginRequired: true
    housekeeping:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
          ephemeral-storage: 50Mi
        limits:
          memory: 1024Mi
          ephemeral-storage: 2Gi
      extraVolumes:
        - name: postgresql-certs
          secret:
            secretName: postgresql-cluster-cert
            defaultMode: 0400
      extraVolumeMounts:
        - name: postgresql-certs
          mountPath: /etc/postgres/tls
    worker:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
          ephemeral-storage: 50Mi
        limits:
          memory: 1024Mi
          ephemeral-storage: 2Gi
      extraVolumes:
        - name: postgresql-certs
          secret:
            secretName: postgresql-cluster-cert
            defaultMode: 0400
      extraVolumeMounts:
        - name: postgresql-certs
          mountPath: /etc/postgres/tls
    postgresql:
      enabled: false
    externalDatabase:
      host: postgresql-primary
      port: 5432
      database: netbox
      username: netbox
      existingSecretName: "postgresql-pguser-netbox"
      existingSecretKey: password
      options:
        sslmode: verify-full
        sslrootcert: /etc/postgres/tls/ca.crt
        sslcert: /etc/postgres/tls/tls.crt
        sslkey: /etc/postgres/tls/tls.key
    extraVolumes:
      - name: postgresql-certs
        secret:
          secretName: postgresql-cluster-cert
          defaultMode: 0400
    extraVolumeMounts:
      - name: postgresql-certs
        mountPath: /etc/postgres/tls
    valkey:
      enabled: false
    tasksDatabase:
      host: redis-master
      existingSecretName: redis
      existingSecretKey: redis-password
    cachingDatabase:
      host: redis-master
      existingSecretName: redis
      existingSecretKey: redis-password
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
        ephemeral-storage: 50Mi
      limits:
        memory: 1024Mi
        ephemeral-storage: 2Gi
    persistence:
      enabled: true
      storageClass: local-path-persistent-namespaced
    ingress:
      enabled: true
      annotations:
        homer.service.name: Administration
        homer.item.logo: "https://raw.githubusercontent.com/netbox-community/netbox/b88b5b0b1b5b78f5a6221019ac41d7a6dd6d73b2/docs/netbox_logo_dark.svg"
      hosts:
        - host: netbox.{{ .Values.fqdn }}
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: netbox
                  port:
                    name: http
      tls:
        - hosts:
            - netbox.{{ .Values.fqdn }}
          secretName: "{{ .Values.fqdn }}-tls"
{{- end }}
