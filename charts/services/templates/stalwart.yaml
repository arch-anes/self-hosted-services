{{- if (include "app.enabled" (list . "stalwart")) }}
{{- include "app.require" (list . "Stalwart" "postgresql" "PostgreSQL") -}}
{{- include "app.require" (list . "Stalwart" "authentik" "Authentik") -}}
{{- include "app.require" (list . "Stalwart" "minio" "MinIO") -}}

