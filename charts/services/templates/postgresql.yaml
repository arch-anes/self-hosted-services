{{- if and (not .Values.disableAllApplications) .Values.applications.postgresql.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-pod-config-custom-env
  namespace: default
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "kube-system"
data:
  ALLOW_NOSSL: "true"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-operator
  namespace: default
type: Opaque
# stringData:
#   LOGICAL_BACKUP_S3_REGION: "some-region"
#   LOGICAL_BACKUP_S3_ENDPOINT: "example.com"
#   LOGICAL_BACKUP_S3_BUCKET: "some-bucket"
#   AWS_ACCESS_KEY_ID: "some-id"
#   AWS_SECRET_ACCESS_KEY: "some-key"

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: postgres-operator
  namespace: kube-system
spec:
  chart: postgres-operator
  repo: https://opensource.zalando.com/postgres-operator/charts/postgres-operator
  version: 1.14.0
  targetNamespace: kube-system
  valuesContent: |-
    configKubernetes:
      enable_cross_namespace_secret: true
      pod_environment_configmap: default/postgres-pod-config-custom-env
    configPostgresPodResources:
      default_memory_request: 250Mi
      default_cpu_request: 1000m
      default_memory_limit: 3Gi
      # operatorconfigurations crd automatically sets the cpu limit to 1000m even when explicitly set to null
      default_cpu_limit: 3000m
    nodeSelector:
      # Schedule onto amd64 to specifically avoid raspberry pi to not wear the SD card
      kubernetes.io/arch: amd64
    configLogicalBackup:
      logical_backup_docker_image: "ghcr.io/zalando/postgres-operator/logical-backup:v1.14.0"
      logical_backup_job_prefix: "postgresql-operator-logical-backup-"
      logical_backup_provider: "s3"
      logical_backup_s3_bucket_prefix: "spilo"
      logical_backup_s3_secret_access_key: ""
      logical_backup_schedule: "30 00 * * *"
      logical_backup_cronjob_environment_secret: "postgres-operator"
      logical_backup_s3_retention_time: "1 month"
    resources:
      requests:
        cpu: 500m
        memory: 250Mi
      limits:
        cpu: null
        memory: 1Gi

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: postgresql
  namespace: default
spec:
  chart: generic
  repo: https://arch-anes.github.io/charts
  version: 0.2.1
  targetNamespace: default
  valuesContent: |-
    objects:
      - apiVersion: acid.zalan.do/v1
        kind: postgresql
        metadata:
          name: postgresql
          namespace: default
        spec:
          teamId: arch-anes
          dockerImage: ghcr.io/arch-anes/spilo-17:4.0-p2
          postgresql:
            version: "17"
            parameters:
              password_encryption: scram-sha-256
              max_connections: "1000"
              shared_preload_libraries: "bg_mon,pg_stat_statements,pgextwlist,pg_auth_mon,set_user,timescaledb,pg_cron,pg_stat_kcache,vchord.so"
          numberOfInstances: 3
          enableLogicalBackup: true
          volume:
            size: 10Gi
            storageClass: local-path-retain
          # During the restoration process, comment out all preparedDatabases.
          preparedDatabases:
            bazarr:
              defaultUsers: true
            gotify:
              defaultUsers: true
            # Important: when restoring a backup, alter the sql dump as indicated in:
            # https://immich.app/docs/administration/backup-and-restore/#manual-backup-and-restore
            immich:
              defaultUsers: true
              extensions:
                earthdistance: public
                vector: public
                vchord: public
            inventree:
              defaultUsers: true
            kubeclarity:
              defaultUsers: true
            miniflux:
              defaultUsers: true
            n8n:
              defaultUsers: true
            netbox:
              defaultUsers: true
            nextcloud:
              defaultUsers: true
            obico:
              defaultUsers: true
            pgadmin4:
              defaultUsers: true
            prowlarr_log: {}
            prowlarr_main: {}
            radarr_log: {}
            radarr_main: {}
            readarr_cache: {}
            readarr_log: {}
            readarr_main: {}
            sonarr_log: {}
            sonarr_main: {}
            speedtest_tracker:
              defaultUsers: true
            tandoor:
              defaultUsers: true
      # Workaround for https://github.com/zalando/postgres-operator/pull/1534
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: postgresql-grant-permissions
          namespace: default
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "5"
            "helm.sh/hook-delete-policy": hook-succeeded
        spec:
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: grant-permissions
                  image: postgres:17
                  env:
                    - name: PGHOST
                      value: postgresql
                    - name: PGUSER
                      valueFrom:
                        secretKeyRef:
                          name: postgres.postgresql.credentials.postgresql.acid.zalan.do
                          key: username
                    - name: PGPASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: postgres.postgresql.credentials.postgresql.acid.zalan.do
                          key: password
                  command:
                    - sh
                    - -c
                    - |
                      echo "Waiting for PostgreSQL to be ready..."
                      until pg_isready -h ${PGHOST} -U ${PGUSER}; do
                        sleep 2
                      done

                      echo "Granting permissions for all databases and schemas..."
                      
                      # Get list of databases
                      DATABASES=$(psql -h ${PGHOST} -U ${PGUSER} -d postgres -t -A -c "SELECT datname FROM pg_database WHERE datname NOT IN ('template0', 'template1', 'postgres');")
                      
                      # Process each database
                      echo "$DATABASES" | while IFS= read -r db_name; do
                        if [ -n "$db_name" ]; then
                          psql -v ON_ERROR_STOP=1 -h ${PGHOST} -U ${PGUSER} -d $db_name -c "
                            DO \$\$
                            DECLARE
                              db_name TEXT;
                              schema_name TEXT;
                              owner_role TEXT;
                              reader_role TEXT;
                              writer_role TEXT;
                            BEGIN
                              db_name := '$db_name';
                              owner_role := db_name || '_owner';
                              reader_role := db_name || '_reader';
                              writer_role := db_name || '_writer';
                              
                              RAISE NOTICE 'Processing database: %', db_name;
                              
                              -- Grant permissions to owner role if it exists
                              IF EXISTS (SELECT 1 FROM pg_roles WHERE rolname = owner_role) THEN
                                -- Loop through all schemas in this database (except system schemas)
                                FOR schema_name IN 
                                  SELECT nspname FROM pg_namespace 
                                  WHERE nspname NOT IN ('information_schema', 'pg_catalog', 'pg_toast')
                                  AND nspname NOT LIKE 'pg_temp_%'
                                  AND nspname NOT LIKE 'pg_toast_temp_%'
                                LOOP
                                  -- Grant schema usage and create permissions for owner
                                  EXECUTE format('GRANT USAGE ON SCHEMA %s TO %s', schema_name, owner_role);
                                  EXECUTE format('GRANT CREATE ON SCHEMA %s TO %s', schema_name, owner_role);
                                  
                                  -- Grant existing object permissions for owner
                                  EXECUTE format('GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA %s TO %s', schema_name, owner_role);
                                  EXECUTE format('GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA %s TO %s', schema_name, owner_role);
                                  EXECUTE format('GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA %s TO %s', schema_name, owner_role);
                                  
                                  -- Set default privileges for future objects
                                  EXECUTE format('ALTER DEFAULT PRIVILEGES IN SCHEMA %s GRANT ALL PRIVILEGES ON TABLES TO %s', schema_name, owner_role);
                                  EXECUTE format('ALTER DEFAULT PRIVILEGES IN SCHEMA %s GRANT ALL PRIVILEGES ON SEQUENCES TO %s', schema_name, owner_role);
                                  EXECUTE format('ALTER DEFAULT PRIVILEGES IN SCHEMA %s GRANT ALL PRIVILEGES ON FUNCTIONS TO %s', schema_name, owner_role);
                                  
                                  RAISE NOTICE 'Granted owner permissions for schema: % database: % role: %', schema_name, db_name, owner_role;
                                END LOOP;
                              END IF;
                              
                              -- Grant permissions to reader role if it exists
                              IF EXISTS (SELECT 1 FROM pg_roles WHERE rolname = reader_role) THEN
                                -- Loop through all schemas in this database (except system schemas)
                                FOR schema_name IN 
                                  SELECT nspname FROM pg_namespace 
                                  WHERE nspname NOT IN ('information_schema', 'pg_catalog', 'pg_toast')
                                  AND nspname NOT LIKE 'pg_temp_%'
                                  AND nspname NOT LIKE 'pg_toast_temp_%'
                                LOOP
                                  -- Grant schema usage for reader
                                  EXECUTE format('GRANT USAGE ON SCHEMA %s TO %s', schema_name, reader_role);
                                  
                                  -- Grant existing object permissions for reader  
                                  EXECUTE format('GRANT SELECT ON ALL TABLES IN SCHEMA %s TO %s', schema_name, reader_role);
                                  EXECUTE format('GRANT SELECT ON ALL SEQUENCES IN SCHEMA %s TO %s', schema_name, reader_role);
                                  
                                  -- Set default privileges for future objects
                                  EXECUTE format('ALTER DEFAULT PRIVILEGES IN SCHEMA %s GRANT SELECT ON TABLES TO %s', schema_name, reader_role);
                                  EXECUTE format('ALTER DEFAULT PRIVILEGES IN SCHEMA %s GRANT SELECT ON SEQUENCES TO %s', schema_name, reader_role);
                                  
                                  RAISE NOTICE 'Granted reader permissions for schema: % database: % role: %', schema_name, db_name, reader_role;
                                END LOOP;
                              END IF;
                              
                              -- Grant permissions to writer role if it exists
                              IF EXISTS (SELECT 1 FROM pg_roles WHERE rolname = writer_role) THEN
                                -- Loop through all schemas in this database (except system schemas)
                                FOR schema_name IN 
                                  SELECT nspname FROM pg_namespace 
                                  WHERE nspname NOT IN ('information_schema', 'pg_catalog', 'pg_toast')
                                  AND nspname NOT LIKE 'pg_temp_%'
                                  AND nspname NOT LIKE 'pg_toast_temp_%'
                                LOOP
                                  -- Grant schema usage for writer
                                  EXECUTE format('GRANT USAGE ON SCHEMA %s TO %s', schema_name, writer_role);
                                  
                                  -- Grant existing object permissions for writer
                                  EXECUTE format('GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA %s TO %s', schema_name, writer_role);
                                  EXECUTE format('GRANT USAGE, SELECT, UPDATE ON ALL SEQUENCES IN SCHEMA %s TO %s', schema_name, writer_role);
                                  
                                  -- Set default privileges for future objects
                                  EXECUTE format('ALTER DEFAULT PRIVILEGES IN SCHEMA %s GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO %s', schema_name, writer_role);
                                  EXECUTE format('ALTER DEFAULT PRIVILEGES IN SCHEMA %s GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO %s', schema_name, writer_role);
                                  
                                  RAISE NOTICE 'Granted writer permissions for schema: % database: % role: %', schema_name, db_name, writer_role;
                                END LOOP;
                              END IF;
                            END \$\$;
                          "
                        fi
                      done
                      
                      echo "All permissions granted successfully!"
{{- end }}
