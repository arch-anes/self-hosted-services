{{- if and (not .Values.disableAllApplications) .Values.applications.argo.enabled }}
{{- if and .Values.primaryTenant }}
{{- if not .Values.applications.redis.enabled }}
{{- fail "Argo requires Redis to be enabled. Please enable Redis in your values.yaml" }}
{{- end }}
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: argo-cd
  namespace: kube-system
spec:
  chart: argo-cd
  repo: https://argoproj.github.io/argo-helm
  version: 9.5.11
  targetNamespace: kube-system
  takeOwnership: true
  # default-values: https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml
  values:
    global:
      domain: argo.{{ .Values.fqdn }}
    configs:
      params:
        server.insecure: true
    server:
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 128Mi
      ingress:
        enabled: true
        annotations:
          homer.service.name: Automation
          homer.service.icon: "fas fa-home"
          homer.service.rank: "4"
          homer.item.name: argo
          homer.item.logo: "https://raw.githubusercontent.com/argoproj/argo-cd/4471603de2a8f3e7e0bdfbd9d487468b6b20a354/docs/assets/argo.png"
          traefik.ingress.kubernetes.io/router.middlewares: kube-system-intranet-allowlist@kubernetescrd
        extraTls:
          - hosts:
              - argo.{{ .Values.fqdn }}
            secretName: "{{ .Values.fqdn }}-tls"
      metrics:
        enabled: {{ include "metrics.enabled" . }}
        serviceMonitor:
          enabled: {{ include "metrics.enabled" . }}
    redis:
      enabled: false
    dex:
      enabled: false
    notifications:
      enabled: false
    externalRedis:
      host: "redis-master.{{ .Values.applicationsNamespace }}.svc.cluster.local"
      port: 6379
      existingSecret: "redis"
    controller:
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 128Mi
      metrics:
        enabled: {{ include "metrics.enabled" . }}
        serviceMonitor:
          enabled: {{ include "metrics.enabled" . }}
    repoServer:
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 128Mi
      metrics:
        enabled: {{ include "metrics.enabled" . }}
        serviceMonitor:
          enabled: {{ include "metrics.enabled" . }}
    applicationSet:
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 64Mi
      metrics:
        enabled: {{ include "metrics.enabled" . }}
        serviceMonitor:
          enabled: {{ include "metrics.enabled" . }}
{{- end }}

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: argo-cd-applicationset-{{ .Values.applicationsNamespace }}
  namespace: kube-system
spec:
  chart: argocd-apps
  repo: https://argoproj.github.io/argo-helm
  version: 2.0.4
  targetNamespace: kube-system
  # default-values: https://github.com/argoproj/argo-helm/blob/main/charts/argocd-apps/values.yaml
  values:
    projects:
      self-hosted-services-{{ .Values.applicationsNamespace }}:
        namespace: kube-system
        description: Project for {{ .Values.applicationsNamespace }}
        sourceRepos:
          - '*'
        destinations:
          - server: https://kubernetes.default.svc
            namespace: {{ .Values.applicationsNamespace }}
          {{- if .Values.primaryTenant }}
          - server: https://kubernetes.default.svc
            namespace: kube-system
          {{- end }}
        clusterResourceWhitelist:
          - group: '*'
            kind: '*'
        {{- if .Values.applications.argo.syncWindows }}
        syncWindows:
          {{- .Values.applications.argo.syncWindows | toYaml | nindent 10 }}
        {{- end }}
    applicationsets:
      self-hosted-services-{{ .Values.applicationsNamespace }}:
        namespace: kube-system
        goTemplate: true
        goTemplateOptions: ["missingkey=error"]
        generators:
          - list:
              elements:
                - environment: prod
        syncPolicy:
          preserveResourcesOnDeletion: true
        template:
          metadata:
            name: self-hosted-services-{{ .Values.applicationsNamespace }}-cd
            namespace: kube-system
          spec:
            syncPolicy:
              syncOptions:
                - ServerSideApply=true
              automated:
                selfHeal: true
            project: self-hosted-services-{{ .Values.applicationsNamespace }}
            source:
              repoURL: {{ .Values.applications.argo.gitRepo }}
              targetRevision: {{ .Values.applications.argo.targetRevision }}
              path: charts/services
              helm:
                valuesObject:
                  {{- .Values | toYaml | nindent 18}}
            destination:
              server: https://kubernetes.default.svc
              namespace: {{ .Values.applicationsNamespace }}
{{- end }}
