{{- if (include "app.enabled" (list . "sparkyfitness")) }}
{{- include "app.require" (list . "SparkyFitness" "postgresql" "PostgreSQL") -}}

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: sparkyfitness
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: oci://ghcr.io/codewithcj/charts/sparkyfitness
  version: 0.17.3
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/CodeWithCJ/SparkyFitness/blob/main/helm/chart/values.yaml
  values:
    config:
      frontendUrl: "https://fit.{{ .Values.fqdn }}"
      adminEmail: "admin@{{ .Values.fqdn }}"
      extraTrustedOrigins: "https://fit.{{ .Values.fqdn }}"
      forceEmailLogin: {{ not (include "app.enabled" (list . "authentik")) }}
      disableEmailLogin: {{ include "app.enabled" (list . "authentik") }}
      disableSignup: false
{{- if (include "app.enabled" (list . "authentik")) }}
      oidc:
        enabled: true
        providerSlug: "authentik"
        providerName: "Authentik"
        issuerUrl: "https://auth.{{ .Values.fqdn }}/application/o/sparkyfitness/"
        scope: "openid email profile"
        autoRegister: true
        autoRedirect: true
        adminGroup: "authentik Admins"
        secrets:
          existingSecret: "sparkyfitness-oidc"
{{- end }}
      email:
        enabled: false
    postgresql:
      enabled: false
    externalDatabase:
      host: postgresql-primary
      port: 5432
      database: sparkyfitness
      auth:
        username: sparkyfitness
        existingSecret: sparkyfitness-db-secret
    server:
      appDatabase:
        username: sparkyfitness
        existingSecret: sparkyfitness-db-secret
      secrets:
        generate: true
      extraEnvFrom:
        - secretRef:
            name: sparkyfitness-smtp
      extraEnv:
        PGSSLMODE: "verify-full"
        PGSSLROOTCERT: "/etc/ssl/postgresql/ca.crt"
        NODE_EXTRA_CA_CERTS: "/etc/ssl/postgresql/ca.crt"
        SPARKY_FITNESS_EMAIL_PORT: "587"
        SPARKY_FITNESS_EMAIL_SECURE: "true"
        SPARKY_FITNESS_EMAIL_FROM: "no-reply@{{ .Values.fqdn }}"
      extraVolumes:
        - name: postgresql-ca
          secret:
            secretName: postgresql-cluster-cert
            items:
              - key: ca.crt
                path: ca.crt
      extraVolumeMounts:
        - name: postgresql-ca
          mountPath: /etc/ssl/postgresql
          readOnly: true
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 512Mi
          cpu: null
      podAnnotations:
        reloader.stakater.com/auto: "true"
        backup.velero.io/backup-volumes: "uploads"
    frontend:
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: null
      podAnnotations:
        reloader.stakater.com/auto: "true"
    ingress:
      enabled: true
      annotations:
        homer.service.name: "Monitoring"
        homer.item.name: "SparkyFitness"
        homer.item.logo: "https://codewithcj.github.io/SparkyFitness/logo.png"
      hosts:
        - host: fit.{{ .Values.fqdn }}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: "{{ .Values.fqdn }}-tls"
          hosts:
            - fit.{{ .Values.fqdn }}

{{- if (include "app.enabled" (list . "authentik")) }}
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: sparkyfitness-extras
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: generic
  repo: https://arch-anes.github.io/charts
  version: 0.2.1
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  values:
    objects:
      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: sparkyfitness-oidc
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          refreshPolicy: CreatedOnce
          target:
            creationPolicy: Owner
            deletionPolicy: Retain
            name: sparkyfitness-oidc
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_id
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: huge-alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_secret
      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: sparkyfitness-db-secret
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          refreshInterval: "1m"
          secretStoreRef:
            name: local-kubernetes-cluster
            kind: ClusterSecretStore
          target:
            creationPolicy: Owner
            deletionPolicy: Delete
            name: sparkyfitness-db-secret
          data:
            - secretKey: username
              remoteRef:
                key: postgresql-pguser-sparkyfitness
                property: user
            - secretKey: password
              remoteRef:
                key: postgresql-pguser-sparkyfitness
                property: password
      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: sparkyfitness-smtp
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          refreshInterval: "1m"
          secretStoreRef:
            name: local-kubernetes-cluster
            kind: ClusterSecretStore
          target:
            creationPolicy: Owner
            deletionPolicy: Delete
            name: sparkyfitness-smtp
            template:
              data:
                SPARKY_FITNESS_EMAIL_HOST: "{{ `{{ .hostname }}` }}"
                SPARKY_FITNESS_EMAIL_USER: "{{ `{{ .username }}` }}"
                SPARKY_FITNESS_EMAIL_PASS: "{{ `{{ .password }}` }}"
          data:
            - secretKey: hostname
              remoteRef:
                key: smtp
                property: hostname
            - secretKey: username
              remoteRef:
                key: smtp
                property: username
            - secretKey: password
              remoteRef:
                key: smtp
                property: password
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: sparkyfitness-authentik-blueprint
          namespace: "{{ .Values.applicationsNamespace }}"
        data:
          blueprint.yaml: |
            # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
            version: 1
            metadata:
              name: SparkyFitness OAuth2 Provider
            entries:
              - id: sparkyfitness-provider
                model: authentik_providers_oauth2.oauth2provider
                identifiers:
                  name: Provider for SparkyFitness
                attrs:
                  grant_types:
                    - authorization_code
                    - refresh_token
                  authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                  invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
                  client_type: confidential
                  redirect_uris:
                    - matching_mode: strict
                      url: "https://fit.{{ .Values.fqdn }}/api/auth/sso/callback/authentik"
                  signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                  client_id: !File /blueprints/mounted/secret-sparkyfitness-oidc/client_id
                  client_secret: !File /blueprints/mounted/secret-sparkyfitness-oidc/client_secret
                  property_mappings:
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
              - id: sparkyfitness-app
                model: authentik_core.application
                identifiers:
                  slug: sparkyfitness
                attrs:
                  name: SparkyFitness
                  provider: !KeyOf sparkyfitness-provider
                  policy_engine_mode: any
{{- end }}
{{- end }}
