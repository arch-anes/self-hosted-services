{{- if (include "app.enabled" (list . "gotify")) }}
{{- include "app.require" (list . "Gotify" "postgresql" "PostgreSQL") -}}
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: gotify
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: gotify
  repo: https://arch-anes.github.io/charts
  version: 1.0.0
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/arch-anes/charts/blob/main/charts/gotify/values.yaml
  values:
    workload:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        podSpec:
          containers:
            main:
              env:
                GOTIFY_DATABASE_DIALECT: postgres
                DATABASE_PASSWORD:
                  secretKeyRef:
                    name: postgresql-pguser-gotify
                    key: password
                    expandObjectName: false
                GOTIFY_DATABASE_CONNECTION: host=postgresql-primary port=5432 user=gotify dbname=gotify password=$(DATABASE_PASSWORD)
                PGSSLMODE: verify-full
                PGSSLROOTCERT: /etc/postgres/tls/ca.crt
                PGSSLCERT: /etc/postgres/tls/tls.crt
                PGSSLKEY: /etc/postgres/tls/tls.key
{{- if (include "app.enabled" (list . "authentik")) }}
                GOTIFY_OIDC_ENABLED: "true"
                GOTIFY_OIDC_ISSUER: "https://auth.{{ .Values.fqdn }}/application/o/gotify/"
                GOTIFY_OIDC_CLIENTID:
                  secretKeyRef:
                    name: gotify
                    key: client_id
                    expandObjectName: false
                GOTIFY_OIDC_CLIENTSECRET:
                  secretKeyRef:
                    name: gotify
                    key: client_secret
                    expandObjectName: false
                GOTIFY_OIDC_REDIRECTURL: "https://gotify.{{ .Values.fqdn }}/auth/oidc/callback"
                GOTIFY_OIDC_LINK_BY_USERNAME: "true"
                GOTIFY_OIDC_AUTOREGISTER: "true"
                GOTIFY_OIDC_USERNAMECLAIM: "preferred_username"
{{- end }}
    resources:
      requests:
        memory: 128Mi
        cpu: 250m
      limits:
        memory: 256Mi
        cpu: null
    global:
      traefik:
        fixedMiddlewares: []
    ingress:
      main:
        enabled: true
        annotations:
          homer.service.name: Feed
          homer.item.logo: "https://raw.githubusercontent.com/gotify/logo/87aef9091f51644eaccf78e7b67f8ce94271efeb/gotify-logo.png"
        hosts:
          - host: gotify.{{ .Values.fqdn }}
            paths:
              - path: /
        tls:
          - secretName: "{{ .Values.fqdn }}-tls"
            hosts:
              - gotify.{{ .Values.fqdn }}
    persistence:
      data:
        type: emptyDir
      postgres-tls:
        enabled: true
        type: secret
        objectName: postgresql-cluster-cert
        expandObjectName: false
        mountPath: /etc/postgres/tls
        readOnly: true
        defaultMode: "0400"
{{- if (include "app.enabled" (list . "authentik")) }}
    extraTpl:
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: authentik-gotify-blueprint
          namespace: "{{ .Values.applicationsNamespace }}"
        data:
          blueprint.yaml: |
            # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
            version: 1
            metadata:
              name: Gotify OAuth2 Provider
            entries:
              - id: gotify-provider
                model: authentik_providers_oauth2.oauth2provider
                identifiers:
                  name: Provider for Gotify
                attrs:
                  grant_types:
                    - authorization_code
                    - refresh_token
                  authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                  invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
                  client_type: confidential
                  sub_mode: user_username
                  redirect_uris:
                    - matching_mode: strict
                      url: "https://gotify.{{ .Values.fqdn }}/auth/oidc/callback"
                    - matching_mode: strict
                      url: "gotify://oidc/callback"
                  signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                  client_id: !File /blueprints/mounted/secret-gotify/client_id
                  client_secret: !File /blueprints/mounted/secret-gotify/client_secret
                  property_mappings:
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
              - id: gotify-app
                model: authentik_core.application
                identifiers:
                  slug: gotify
                attrs:
                  name: Gotify
                  provider: !KeyOf gotify-provider
                  policy_engine_mode: any
      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: gotify
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          refreshPolicy: CreatedOnce
          target:
            name: gotify
            creationPolicy: Owner
            deletionPolicy: Retain
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_id
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: huge-alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_secret
{{- end }}
{{- end }}
