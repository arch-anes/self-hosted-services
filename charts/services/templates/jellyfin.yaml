{{- if (include "app.enabled" (list . "jellyfin")) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: multimedia
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  storageClassName: local-path-persistent
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Ti

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: jellyfin
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: oci://oci.trueforge.org/truecharts/jellyfin
  version: 23.2.1
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/trueforge-org/truecharts/blob/master/charts/stable/jellyfin/values.yaml
  values:
    securityContext:
      pod:
        supplementalGroups:
          - 109
    workload:
      main:
        podSpec:
          nodeSelector:
            nas: "true"
          annotations:
            backup.velero.io/backup-volumes: config
          containers:
            main:
              env:
                JELLYFIN_DATA_DIR: /config
                JELLYFIN_CONFIG_DIR: /config/config
                JELLYFIN_LOG_DIR: /config/log
                JELLYFIN_PublishedServerUrl: "https://jellyfin.{{ .Values.fqdn }}"
    resources:
      requests:
        memory: 2Gi
        cpu: 1000m
      limits:
        memory: 4Gi
        cpu: null
        {{- include "gpu.device" (list . "Jellyfin" .Values.applications.jellyfin.gpu_vendor) | nindent 8 }}
    global:
      traefik:
        fixedMiddlewares: []
    ingress:
      main:
        enabled: true
        annotations:
          homer.service.name: Media
          homer.service.icon: "fas fa-video"
          homer.service.rank: "1"
          homer.item.rank: "1"
          homer.item.logo: "https://github.com/jellyfin/jellyfin/raw/cd36b8067fcf80c5ebb47bdd9bea0047d1fe3aef/Emby.Dlna/Images/logo240.png"
        hosts:
          - host: jellyfin.{{ .Values.fqdn }}
            paths:
              - path: /
        tls:
          - secretName: "{{ .Values.fqdn }}-tls"
            hosts:
              - jellyfin.{{ .Values.fqdn }}
    persistence:
      multimedia:
        enabled: true
        type: pvc
        mountPath: /media
        existingClaim: multimedia
      config:
        type: pvc
        storageClass: local-path-persistent-namespaced
      cache:
        type: pvc
        existingClaim: multimedia
        subPath: jellyfin-cache
      data:
        enabled: false
      logs:
        enabled: false
      transcode:
        enabled: false
{{- end }}
