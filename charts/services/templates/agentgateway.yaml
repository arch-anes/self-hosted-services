{{- if and (not .Values.disableAllApplications) .Values.applications.agentgateway.enabled }}
{{- if .Values.primaryTenant }}
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: agentgateway-crds
  namespace: kube-system
spec:
  chart: oci://cr.agentgateway.dev/charts/agentgateway-crds
  version: v1.1.0
  targetNamespace: kube-system
  bootstrap: true
{{- end }}

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: agentgateway
  namespace: {{ .Values.applicationsNamespace }}
spec:
  chart: oci://cr.agentgateway.dev/charts/agentgateway
  version: v1.1.0
  targetNamespace: {{ .Values.applicationsNamespace }}
  valuesContent: |-
    inferenceExtension:
      enabled: true
    rbac:
      create: true

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: agentgateway-config
  namespace: {{ .Values.applicationsNamespace }}
spec:
  chart: generic
  repo: https://arch-anes.github.io/charts
  version: 0.2.1
  targetNamespace: {{ .Values.applicationsNamespace }}
  valuesContent: |-
    objects:
      - apiVersion: agentgateway.dev/v1alpha1
        kind: AgentgatewayParameters
        metadata:
          name: agentgateway-proxy
          namespace: {{ .Values.applicationsNamespace }}
        spec:
          rawConfig:
            config:
              adminAddr: "0.0.0.0:15000"
          service:
            spec:
              type: ClusterIP
              ports:
                - name: admin-ui
                  port: 15000
                  targetPort: 15000
                  protocol: TCP
      - apiVersion: gateway.networking.k8s.io/v1
        kind: Gateway
        metadata:
          name: agentgateway-proxy
          namespace: {{ .Values.applicationsNamespace }}
        spec:
          gatewayClassName: agentgateway
          infrastructure:
            parametersRef:
              group: agentgateway.dev
              kind: AgentgatewayParameters
              name: agentgateway-proxy
          listeners:
          - name: http
            port: 80
            protocol: HTTP
            allowedRoutes:
              namespaces:
                from: All
      - apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: agentgateway-proxy
          namespace: {{ .Values.applicationsNamespace }}
          annotations:
            traefik.ingress.kubernetes.io/router.middlewares: kube-system-mcp-stream@kubernetescrd
            homer.item.excluded: "true"
        spec:
          rules:
            - host: ai.{{ .Values.fqdn }}
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: agentgateway-proxy
                      port:
                        number: 80
          tls:
            - hosts:
              - ai.{{ .Values.fqdn }}
              secretName: "{{ .Values.fqdn }}-tls"
      - apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: agentgateway-admin-ui
          namespace: {{ .Values.applicationsNamespace }}
          annotations:
            traefik.ingress.kubernetes.io/router.middlewares: kube-system-intranet-allowlist@kubernetescrd
            homer.service.name: Monitoring
            homer.item.name: "AgentGateway Dashboard"
        spec:
          rules:
            - host: agentgateway.{{ .Values.fqdn }}
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: agentgateway-proxy
                      port:
                        number: 15000
          tls:
            - hosts:
              - agentgateway.{{ .Values.fqdn }}
              secretName: "{{ .Values.fqdn }}-tls"
      - apiVersion: agentgateway.dev/v1alpha1
        kind: AgentgatewayBackend
        metadata:
          name: authentik-idp
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          static:
            host: "auth.{{ .Values.fqdn }}"
            port: 443
      - apiVersion: agentgateway.dev/v1alpha1
        kind: AgentgatewayPolicy
        metadata:
          name: agentgateway-proxy-authentication
          namespace: {{ .Values.applicationsNamespace }}
        spec:
          targetRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: agentgateway-proxy
          traffic:
            jwtAuthentication:
              # Validation mode: Strict requires all claims to be valid
              mode: Strict
              providers:
                - issuer: "https://auth.{{ .Values.fqdn }}/application/o/agentgateway/"
                  jwks:
                    remote:
                      jwksPath: "/application/o/agentgateway/jwks/"
                      backendRef:
                        group: agentgateway.dev
                        kind: AgentgatewayBackend
                        name: authentik-idp
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: authentik-agentgateway-blueprint
          namespace: {{ .Values.applicationsNamespace }}
        data:
          blueprint.yaml: |
            # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
            version: 1
            metadata:
              name: AgentGateway OAuth2 Provider
            entries:
              - id: agentgateway-provider
                model: authentik_providers_oauth2.oauth2provider
                identifiers:
                  name: Provider for AgentGateway
                attrs:
                  authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                  invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
                  client_type: confidential
                  redirect_uris:
                    - matching_mode: regex
                      url: "https://ai.{{ .Values.fqdn }}/.*"
                  signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                  client_id: !File /blueprints/mounted/secret-agentgateway/client_id
                  client_secret: !File /blueprints/mounted/secret-agentgateway/client_secret
                  property_mappings:
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
              - id: agentgateway-app
                model: authentik_core.application
                identifiers:
                  slug: agentgateway
                attrs:
                  name: AgentGateway
                  provider: !KeyOf agentgateway-provider
                  policy_engine_mode: any
      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: agentgateway
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          refreshPolicy: CreatedOnce
          creationPolicy: Owner
          deletionPolicy: Retain
          target:
            name: agentgateway
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_id
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: huge-alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_secret
{{- end }}
