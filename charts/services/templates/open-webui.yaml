{{- if include "app.enabled" (list . "open_webui") }}
{{- if not (include "app.enabled" (list . "postgresql")) }}
{{- fail "Open WebUI requires PostgreSQL to be enabled. Please enable PostgreSQL in your values.yaml" }}
{{- end }}

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: open-webui
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: open-webui
  repo: https://helm.openwebui.com/
  version: 14.1.0
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/open-webui/helm-charts/blob/main/charts/open-webui/values.yaml
  values:
    pipelines:
      enabled: false
    ollama:
      enabled: false
    postgresql:
      enabled: false
{{- if include "app.enabled" (list . "llama_cpp") }}
    openaiBaseApiUrl: "http://llama-cpp:8080/v1"
    openaiBaseApiUrls:
      - "http://llama-cpp:8080/v1"
    openaiApiKey: ""
{{- end }}
    websocket:
      enabled: false
      redis:
        enabled: false
    extraEnvVars:
      - name: WEBUI_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: open-webui
            key: webui_secret
      - name: DATABASE_TYPE
        value: postgresql
      - name: DATABASE_HOST
        value: postgresql-primary
      - name: DATABASE_PORT
        value: "5432"
      - name: DATABASE_NAME
        value: open-webui
      - name: DATABASE_USER
        value: open-webui
      - name: DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: postgresql-pguser-open-webui
            key: password
      - name: REDIS_HOST_PASSWORD
        valueFrom:
          secretKeyRef:
            name: redis
            key: redis-password
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: hugging-face
            key: token
    {{- if include "app.enabled" (list . "authentik") }}
    sso:
      enabled: true
      enableSignup: true
      mergeAccountsByEmail: true
      oidc:
        enabled: true
        providerName: "Authentik"
        clientId: open-webui
        clientExistingSecret: open-webui
        clientExistingSecretKey: client_secret
        providerUrl: "https://auth.{{ .Values.fqdn }}/application/o/open-webui/.well-known/openid-configuration"
    {{- end }}
    persistence:
      enabled: false
    resources:
      requests:
        memory: 1Gi
        cpu: 500m
      limits:
        memory: 2Gi
    ingress:
      enabled: true
      annotations:
        homer.service.name: Automation
        homer.item.logo: "https://openwebui.com/favicon.png"
      host: chat.{{ .Values.fqdn }}
      tls: true
      existingSecret: "{{ .Values.fqdn }}-tls"
    {{- if include "app.enabled" (list . "authentik") }}
    extraResources:
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: authentik-open-webui-blueprint
          namespace: "{{ .Values.applicationsNamespace }}"
        data:
          blueprint.yaml: |
            # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
            version: 1
            metadata:
              name: Open WebUI OAuth2 Provider
            entries:
              - id: open-webui-provider
                model: authentik_providers_oauth2.oauth2provider
                identifiers:
                  name: Provider for Open WebUI
                attrs:
                  authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                  invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
                  client_type: confidential
                  sub_mode: user_username
                  redirect_uris: 
                    - matching_mode: strict
                      url: "https://chat.{{ .Values.fqdn }}/oauth/oidc/callback"
                  signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
                  client_id: open-webui
                  client_secret: !File /blueprints/mounted/secret-open-webui/client_secret
                  property_mappings:
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                    - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
              - id: open-webui-app
                model: authentik_core.application
                identifiers:
                  slug: open-webui
                attrs:
                  name: Open WebUI
                  provider: !KeyOf open-webui-provider
                  policy_engine_mode: any
      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: open-webui
          namespace: "{{ .Values.applicationsNamespace }}"
        spec:
          refreshPolicy: CreatedOnce
          creationPolicy: Owner
          deletionPolicy: Retain
          target:
            name: open-webui
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: huge-alphanumerical-password-generator
              rewrite:
                - transform:
                    template: webui_secret
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: ClusterGenerator
                  name: huge-alphanumerical-password-generator
              rewrite:
                - transform:
                    template: client_secret
    {{- end }}
{{- end }}
