      prune: true
      sidecar:
        # Workaround for https://github.com/grafana/helm-charts/issues/4023
        datasources:
          watchMethod: SLEEP
        dashboards:
          searchNamespace: ALL
      admin:
        existingSecret: prometheus
        userKey: grafana-admin-user
        passwordKey: grafana-admin-password
      grafana.ini:
        dashboards:
          default_home_dashboard_path: /var/lib/grafana/dashboards/default/kubernetes-views-global.json
        server:
          root_url: https://grafana.{{ .Values.fqdn }}
          domain: grafana.{{ .Values.fqdn }}
          serve_from_sub_path: true
      ingress:
        enabled: true
        annotations:
          homer.service.name: Monitoring
          homer.item.name: Grafana
          homer.item.logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Grafana_logo.svg/1920px-Grafana_logo.svg.png"
          traefik.ingress.kubernetes.io/router.middlewares: kube-system-intranet-allowlist@kubernetescrd
        hosts:
          - grafana.{{ .Values.fqdn }}
        tls:
          - secretName: "{{ .Values.fqdn }}-tls"
            hosts:
              - grafana.{{ .Values.fqdn }}
      persistence:
        enabled: true
        storageClassName: local-path-persistent
        accessModes:
          - ReadWriteOnce
        size: 20Gi
        finalizers:
          - kubernetes.io/pvc-protection
      nodeSelector:
        # Schedule onto amd64 to specifically avoid raspberry pi to not wear the SD card
        kubernetes.io/arch: amd64
      resources:
        limits:
          memory: 2Gi
        requests:
          memory: 1Gi
          cpu: 2000m
    prometheus:
      prometheusSpec:
        enableAdminAPI: true
        enableRemoteWriteReceiver: true
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        replicas: 1
        retention: 365d
        podAntiAffinity: hard
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        nodeSelector:
          # Schedule onto amd64 to specifically avoid raspberry pi to not wear the SD card
          kubernetes.io/arch: amd64
        resources:
          limits:
            memory: 5Gi
          requests:
            cpu: 500m
            memory: 1Gi
{{- if .Values.applications.ipmi_exporter.enabled }}
        secrets:
          - ipmi-exporter
{{- end }}
    ## k3s only ##
    # Avoid duplicated metrics in k3s: https://tinyurl.com/mrhjre9n
    kubelet:
      jobNameOverride: k3s-server
      service:
        enabled: false
      serviceMonitor:
        enabled: false
    kubeApiServer:
      jobNameOverride: k3s-server
      service:
        enabled: false
      serviceMonitor:
        enabled: false
    kubeControllerManager:
      jobNameOverride: k3s-server
      service:
        enabled: false
      serviceMonitor:
        enabled: false
    kubeScheduler:
      jobNameOverride: k3s-server
      service:
        enabled: false
      serviceMonitor:
        enabled: false
    kubeProxy:
      jobNameOverride: k3s-server
      service:
        enabled: false
      serviceMonitor:
        enabled: false
    kubeEtcd:
      service:
        enabled: false
      serviceMonitor:
        enabled: false
    extraManifests:
{{- if .Values.applications.gotify.enabled }}
      - apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: alertmanager-gotify-bridge
          namespace: kube-system
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: alertmanager-gotify-bridge
          template:
            metadata:
              labels:
                app: alertmanager-gotify-bridge
            spec:
              containers:
                - name: gotify-bridge
                  image: ghcr.io/druggeri/alertmanager_gotify_bridge:2.3.2
                  resources:
                    requests:
                      cpu: 100m
                      memory: 16Mi
                    limits:
                      memory: 64Mi
                  ports:
                    - containerPort: 8080
                  env:
                    - name: GOTIFY_ENDPOINT
                      value: "http://gotify.{{ .Values.applicationsNamespace }}.svc.cluster.local/message"
                    - name: GOTIFY_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: prometheus
                          key: grafana-gotify-token
                    - name: EXTENDED_DETAILS
                      value: "true"
      - apiVersion: v1
        kind: Service
        metadata:
          name: alertmanager-gotify-bridge
          namespace: kube-system
        spec:
          selector:
            app: alertmanager-gotify-bridge
          ports:
            - port: 8080
              targetPort: 8080
{{- end }}
      - apiVersion: helm.cattle.io/v1
        kind: HelmChart
        metadata:
          name: pushprox-k3s-server
          namespace: kube-system
        spec:
          chart: rancher-pushprox
          repo: https://arch-anes.github.io/charts
          version: 0.1.9
          targetNamespace: kube-system
          # reference: https://github.com/arch-anes/charts/blob/main/charts/rancher-pushprox/values.yaml
          values:
            metricsPort: 10250
            component: k3s-server
            clients:
              port: 10013
              useLocalhost: true
              resources:
                limits:
                  memory: 64Mi
                requests:
                  memory: 16Mi
                  cpu: 100m
              https:
                enabled: true
                useServiceAccountCredentials: true
                insecureSkipVerify: true
              rbac:
                additionalRules:
                  - nonResourceURLs: ["/metrics/cadvisor"]
                    verbs: ["get"]
                  - apiGroups: [""]
                    resources: ["nodes/metrics"]
                    verbs: ["get"]
              tolerations:
                - effect: "NoExecute"
                  operator: "Exists"
                - effect: "NoSchedule"
                  operator: "Exists"
            serviceMonitor:
              endpoints:
                # kubelet /metrics: k3s-server exposes apiserver, kubelet, scheduler, controller-manager
                # and etcd metrics all on the same endpoint.
                - port: metrics
                  honorLabels: true
                  relabelings:
                    # Required for upstream recording rules that join on metrics_path.
                    - sourceLabels: [__metrics_path__]
                      targetLabel: metrics_path
                    # Use the node name as instance so dashboards show human-readable hostnames.
                    - sourceLabels:
                        - __meta_kubernetes_pod_node_name
                      targetLabel: instance
                      action: replace
                  metricRelabelings:
                    # Drop all etcd_request_* metrics (apiserver client-side view of etcd latency).
                    # No recording rules, no dashboard, and no alerting rules reference these; the
                    # real etcd health metrics (etcd_server_*, etcd_disk_*, …) come from the
                    # dedicated kube-etcd PushProx job instead.
                    - action: drop
                      sourceLabels: [__name__]
                      regex: 'etcd_request.*'
                    # Drop intermediate histogram buckets for apiserver request latencies that are
                    # never queried. The kept buckets (0.05, 0.1, 0.2, 0.4, 0.6, 0.8, 1, 1.5, 2,
                    # 3, 4, 5, 10, 15, 20, 25, 30, 40, 50, 60) still satisfy the SLO recording rules.
                    - action: drop
                      sourceLabels: [__name__, le]
                      regex: (apiserver_request_slo|apiserver_request_sli|apiserver_request)_duration_seconds_bucket;(0\.15|0\.2|0\.3|0\.35|0\.4|0\.45|0\.6|0\.7|0\.8|0\.9|1\.25|1\.5|1\.75|2|3|3\.5|4|4\.5|6|7|8|9|15|20|40|45|50)(\.0)?
                    # Drop intermediate histogram buckets for kubelet storage operation latencies.
                    - action: drop
                      sourceLabels: [__name__, le]
                      regex: (csi_operations|storage_operation_duration)_seconds_bucket;(0\.25|2\.5|15|25|120|600)(\.0)?
                    # Drop apiserver capacity/diagnostic histograms that have no recording rule,
                    # dashboard, or alert consumer. These are useful for investigating request-size
                    # anomalies or watch-stream storms, but only in environments where those
                    # problems actually occur (high-node-count clusters, etcd size limits, etc.).
                    # Constraint: dropping them makes historical size/latency data unavailable for
                    # ad-hoc queries. Re-enable by removing this rule if you need to investigate
                    # e.g. who is sending large writes or which resource floods the watch stream.
                    - action: drop
                      sourceLabels: [__name__]
                      regex: 'apiserver_(request_body_size_bytes|response_sizes|watch_cache_read_wait_seconds|watch_events_sizes|watch_list_duration_seconds)_bucket'
                # kubelet /metrics/cadvisor: per-container resource usage metrics.
                - port: metrics
                  path: /metrics/cadvisor
                  honorLabels: true
                  relabelings:
                    - sourceLabels: [__metrics_path__]
                      targetLabel: metrics_path
                    - sourceLabels:
                        - __meta_kubernetes_pod_node_name
                      targetLabel: instance
                      action: replace
                  metricRelabelings:
                    # Drop low-value CPU metrics not used by any dashboard or alert.
                    - sourceLabels: [__name__]
                      action: drop
                      regex: 'container_cpu_(load_average_10s|system_seconds_total|user_seconds_total)'
                    # Drop filesystem metrics that are always zero or redundant with node-exporter.
                    - sourceLabels: [__name__]
                      action: drop
                      regex: 'container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)'
                    # Drop memory metrics that are always zero in practice.
                    - sourceLabels: [__name__]
                      action: drop
                      regex: 'container_memory_mapped_file'
                    # Drop low-value process metrics not used by any dashboard or alert.
                    - sourceLabels: [__name__]
                      action: drop
                      regex: 'container_(file_descriptors|tasks_state|threads_max)'
                    # Drop the hierarchy scope for memory failures — only the container scope is useful.
                    - sourceLabels: [__name__, scope]
                      action: drop
                      regex: 'container_memory_failures_total;hierarchy'
                    # Drop network metrics for CNI virtual interfaces (not real node traffic).
                    - sourceLabels: [__name__, interface]
                      action: drop
                      regex: 'container_network_.*;(cali|cilium|cni|lxc|nodelocaldns|tunl).*'
                    # Drop container spec metrics — already covered by kube-state-metrics.
                    - sourceLabels: [__name__]
                      action: drop
                      regex: 'container_spec.*'
                    # Drop cgroup-level entries that have no associated pod (system slices, etc).
                    # Uses '/.+;' instead of '.+;' to preserve the root cgroup (id="/") which
                    # is used by dashboards for cluster-wide CPU/memory totals.
                    - sourceLabels: [id, pod]
                      action: drop
                      regex: '/.+;'
                # kubelet /metrics/probes: liveness/readiness/startup probe results per container.
                - port: metrics
                  path: /metrics/probes
                  honorLabels: true
                  relabelings:
                    - sourceLabels: [__metrics_path__]
                      targetLabel: metrics_path
                    - sourceLabels:
                        - __meta_kubernetes_pod_node_name
                      targetLabel: instance
                      action: replace
            proxy:
              resources:
                limits:
                  memory: 64Mi
                requests:
                  memory: 16Mi
                  cpu: 100m
      - apiVersion: helm.cattle.io/v1
        kind: HelmChart
        metadata:
          name: pushprox-kube-etcd
          namespace: kube-system
        spec:
          chart: rancher-pushprox
          repo: https://arch-anes.github.io/charts
          version: 0.1.9
          targetNamespace: kube-system
          # reference: https://github.com/arch-anes/charts/blob/main/charts/rancher-pushprox/values.yaml
          values:
            metricsPort: 2381
            component: kube-etcd
            clients:
              port: 10014
              useLocalhost: true
              nodeSelector:
                node-role.kubernetes.io/etcd: "true"
              resources:
                limits:
                  memory: 64Mi
                requests:
                  memory: 16Mi
                  cpu: 100m
              tolerations:
                - effect: "NoExecute"
                  operator: "Exists"
                - effect: "NoSchedule"
                  operator: "Exists"
            serviceMonitor:
              endpoints:
                - port: metrics
                  honorLabels: true
                  relabelings:
                    - targetLabel: source
                      replacement: kubernetes
                    - sourceLabels:
                        - __meta_kubernetes_pod_node_name
                      targetLabel: instance
                      action: replace
            proxy:
              resources:
                limits:
                  memory: 64Mi
                requests:
                  memory: 16Mi
                  cpu: 100m
{{- end }}
