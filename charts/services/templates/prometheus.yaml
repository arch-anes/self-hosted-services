            revision: 41
            datasource: Prometheus
          kubernetes-views-global:
            gnetId: 15757
            revision: 1
            datasource: Prometheus
          kubernetes-views-nodes:
            gnetId: 15759
            revision: 37
            datasource: Prometheus
          kubernetes-views-namespaces:
            gnetId: 15758
            revision: 42
            datasource: Prometheus
          kubernetes-views-pods:
            gnetId: 15760
            revision: 36
            datasource: Prometheus
          prometheus:
            gnetId: 19105
            revision: 7
            datasource: Prometheus
          oom:
            gnetId: 16718
            revision: 1
