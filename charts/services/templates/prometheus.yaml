                value: Prometheus
              - name: DS_LOKI
                value: Loki
{{- end }}
{{- if .Values.applications.loki.enabled }}
          loki:
            gnetId: 14055
            revision: 5
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
              - name: DS_LOKI
                value: Loki
{{- end }}
{{- if .Values.applications.postgresql.enabled }}
          pgbackrest:
