{{- if and .Values.primaryTenant (not .Values.disableAllApplications) .Values.applications.prometheus.enabled }}
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: prometheus
#   namespace: kube-system
# type: Opaque
# stringData:
#   grafana-admin-user: "someuser"
#   grafana-admin-password: "somepass"
#   grafana-gotify-token: "sometoken"

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: prometheus-operator-crds
  namespace: kube-system
spec:
  chart: prometheus-operator-crds
  repo: https://prometheus-community.github.io/helm-charts
  version: 28.0.1
  targetNamespace: kube-system
  # reference: https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus-operator-crds/values.yaml
  bootstrap: true

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: prometheus
  namespace: kube-system
spec:
  chart: kube-prometheus-stack
  repo: https://prometheus-community.github.io/helm-charts
  version: 84.1.0
  targetNamespace: kube-system
  # reference: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
  values:
    crds:
      enabled: false
    prometheus-node-exporter:
      hostNetwork: false
      prometheus:
        monitor:
          relabelings:
            - sourceLabels:
                - __meta_kubernetes_pod_node_name
              targetLabel: instance
              action: replace
            - sourceLabels: 
                - __meta_kubernetes_pod_node_name
              separator: ;
              regex: ^(.*)$
              targetLabel: nodename
              replacement: $1
              action: replace
          attachMetadata:
            node: true
      resources:
        limits:
          memory: 64Mi
        requests:
          memory: 16Mi
          cpu: 100m
    defaultRules:
      rules:
        windows: false
{{- if .Values.applications.gotify.enabled }}
    alertmanager:
      alertmanagerSpec:
        retention: 336h # 2 weeks
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ['alertname']
          group_wait: 1m
          group_interval: 5m
          repeat_interval: 1w
          receiver: 'gotify'
        receivers:
          - name: 'null'
          - name: 'gotify'
            webhook_configs:
              - url: "http://alertmanager-gotify-bridge.kube-system.svc.cluster.local:8080/gotify_webhook"
                send_resolved: false
{{- end }}
    grafana:
      annotations:
        reloader.stakater.com/auto: "true"
{{- if and (not .Values.disableAllApplications) (or .Values.applications.loki.enabled .Values.applications.tempo.enabled) }}
      additionalDataSources:
{{- if .Values.applications.loki.enabled }}
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki:3100
          isDefault: false
          jsonData:
            timeout: 60
            maxLines: 1000
{{- end }}
{{- if .Values.applications.tempo.enabled }}
        - name: Tempo
          uid: tempo
          type: tempo
          access: proxy
          url: http://tempo:3200
          isDefault: false
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: -2m
              spanEndTimeShift: 2m
              tags: ['cluster','namespace','pod','service.name','service.namespace']
              customQuery: true
              query: '{ $$__tags } |~ "$${__span.traceId}"'
            tracesToMetrics:
              datasourceUid: prometheus
              spanStartTimeShift: -2m
              spanEndTimeShift: 2m
              tags: [{ key: 'service.name', value: 'service' }, { key: 'service.namespace', value: 'namespace' }]
              queries:
                - name: Latency p95
                  unit: ms
                  query: 'histogram_quantile(0.95, sum by (le,service,span_name) (rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])))'
                - name: Error rate
                  unit: ops
                  query: 'sum by (service,span_name) (rate(traces_spanmetrics_calls_total{$$__tags,status_code="STATUS_CODE_ERROR"}[5m]))'
{{- end }}
{{- end }}
      defaultDashboards:
        namespace: kube-system
        useExistingNamespace: true
      defaultDashboardsTimezone: browser
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: 'default'
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              allowUiUpdates: true
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          cert-manager:
            gnetId: 20340
            revision: 1
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          traefik:
            gnetId: 17347
            revision: 9
            datasource: Prometheus
          node-exporter-full:
