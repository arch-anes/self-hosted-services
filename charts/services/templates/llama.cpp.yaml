{{- if include "app.enabled" (list . "llama_cpp") }}
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: hugging-face
#   namespace: "{{ .Values.applicationsNamespace }}"
# type: Opaque
# stringData:
#   token: "some_hugging_face_token"

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: llama-cpp
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: llama-cpp
  repo: https://arch-anes.github.io/charts
  version: 1.0.5
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/arch-anes/charts/blob/main/charts/llama-cpp/values.yaml
  values:
    {{- $gpuVendor := .Values.applications.llama_cpp.gpu_vendor }}
    {{- with $gpuVendor }}
    gpu:
      enabled: true
      type: {{ . }}
      useVulkan: {{ $.Values.applications.llama_cpp.use_vulkan }}
    {{- end }}
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                LLAMA_ARG_WEBUI: disabled
                LLAMA_ARG_MODELS_MAX: "{{ .Values.applications.llama_cpp.max_loaded_models }}"
                LLAMA_ARG_MODELS_PRESET: /models/preset.ini
                HF_TOKEN:
                  secretKeyRef:
                    name: hugging-face
                    key: token
                    expandObjectName: false
              resources:
                requests:
                  memory: 1Gi
                  cpu: 1000m
                limits:
                  cpu: ''
                  memory: ''
                  {{- if eq $gpuVendor "intel" }}
                    {{- if not (include "app.enabled" (list . "intel_gpu")) }}
                      {{- fail "Intel GPU is selected for llama.cpp but intel_gpu is not enabled" }}
                    {{- end }}
                  gpu.intel.com/i915: {{ .Values.applications.llama_cpp.gpu_count }}
                  {{- else if eq $gpuVendor "intel_xe" }}
                    {{- if not (include "app.enabled" (list . "intel_gpu")) }}
                      {{- fail "Intel GPU is selected for llama.cpp but intel_gpu is not enabled" }}
                    {{- end }}
                  gpu.intel.com/xe: {{ .Values.applications.llama_cpp.gpu_count }}
                  {{- else if eq $gpuVendor "nvidia" }}
                    {{- if not (include "app.enabled" (list . "nvidia_gpu")) }}
                      {{- fail "NVIDIA GPU is selected for llama.cpp but nvidia_gpu is not enabled" }}
                    {{- end }}
                  nvidia.com/gpu: {{ .Values.applications.llama_cpp.gpu_count }}
                  {{- else if eq $gpuVendor "amd" }}
                    {{- if not (include "app.enabled" (list . "amd_gpu")) }}
                      {{- fail "AMD GPU is selected for llama.cpp but amd_gpu is not enabled" }}
                    {{- end }}
                  amd.com/gpu: {{ .Values.applications.llama_cpp.gpu_count }}
                  {{- else if $gpuVendor }}
                    {{- fail (printf "Unknown GPU vendor '%s' selected for llama.cpp" $gpuVendor) }}
                  {{- end }}
          tolerations:
            - key: "dedicated"
              operator: Equal
              value: "ai"
              effect: "NoSchedule"
    persistence:
      models:
        type: pvc
        storageClass: local-path-persistent-namespaced
{{- end }}
