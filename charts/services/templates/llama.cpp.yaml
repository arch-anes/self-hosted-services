{{- if (include "app.enabled" (list . "llama_cpp")) }}
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: hugging-face
#   namespace: "{{ .Values.applicationsNamespace }}"
# type: Opaque
# stringData:
#   token: "some_hugging_face_token"

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: llama-cpp
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: llama-cpp
  repo: https://arch-anes.github.io/charts
  version: 1.1.4
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/arch-anes/charts/blob/main/charts/llama-cpp/values.yaml
  values:
    {{- $gpuVendor := .Values.applications.llama_cpp.gpu_vendor }}
    {{- with $gpuVendor }}
    gpu:
      enabled: true
      type: {{ . }}
      useVulkan: {{ $.Values.applications.llama_cpp.use_vulkan }}
    {{- end }}
    {{- $embeddingsGpuVendor := .Values.applications.llama_cpp.embeddings.gpu_vendor }}
    {{- with .Values.applications.llama_cpp.embeddings }}
    embeddings:
      enabled: {{ .enabled }}
      {{- with $embeddingsGpuVendor }}
      gpu:
        enabled: true
        type: {{ . }}
        useVulkan: {{ $.Values.applications.llama_cpp.embeddings.use_vulkan }}
      {{- end }}
    {{- end }}
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                LLAMA_ARG_WEBUI: disabled
                LLAMA_ARG_MODELS_MAX: "{{ .Values.applications.llama_cpp.max_loaded_models }}"
                LLAMA_ARG_MODELS_PRESET: /models/preset.ini
                HUGGINGFACE_HUB_CACHE: /models/huggingface
                HF_TOKEN:
                  secretKeyRef:
                    name: hugging-face
                    key: token
                    expandObjectName: false
              extraArgs:
                - --sleep-idle-seconds 
                - "3600"
              resources:
                requests:
                  memory: 1Gi
                  cpu: 1000m
                limits:
                  cpu: null
                  memory: null
                  {{- include "gpu.device" (list . "llama.cpp" $gpuVendor .Values.applications.llama_cpp.gpu_count) | nindent 18 }}
          tolerations:
            - key: "dedicated"
              operator: Equal
              value: "ai"
              effect: "NoSchedule"
      embeddings:
        podSpec:
          containers:
            embeddings:
              env:
                LLAMA_ARG_WEBUI: disabled
                LLAMA_ARG_HF_REPO: "nomic-ai/nomic-embed-text-v1.5-GGUF:Q4_K_M"
                LLAMA_ARG_N_PARALLEL: "1"
                LLAMA_ARG_UBATCH: "8192"
                LLAMA_ARG_BATCH: "8192"
                LLAMA_ARG_CTX_SIZE: "8192"
                LLAMA_ARG_ROPE_SCALING_TYPE: "yarn"
                LLAMA_ARG_ROPE_FREQ_SCALE: ".75"
                HUGGINGFACE_HUB_CACHE: /models/huggingface
                HF_TOKEN:
                  secretKeyRef:
                    name: hugging-face
                    key: token
                    expandObjectName: false
              resources:
                requests:
                  memory: 128Mi
                  cpu: 100m
                limits:
                  cpu: null
                  memory: null
                  {{- include "gpu.device" (list . "llama.cpp embeddings" $embeddingsGpuVendor .Values.applications.llama_cpp.embeddings.gpu_count) | nindent 18 }}
          tolerations:
            - key: "dedicated"
              operator: Equal
              value: "ai"
              effect: "NoSchedule"
    persistence:
      models:
        type: pvc
        storageClass: local-path-persistent-namespaced
        targetSelector:
          main:
            main:
              mountPath: /models
      embeddings:
        enabled: {{ .Values.applications.llama_cpp.embeddings.enabled }}
        type: pvc
        storageClass: local-path-persistent-namespaced
        targetSelector:
          embeddings:
            embeddings:
              mountPath: /models
{{- end }}
