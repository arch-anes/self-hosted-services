{{- if (include "app.enabled" (list . "llama_cpp")) }}
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: hugging-face
#   namespace: "{{ .Values.applicationsNamespace }}"
# type: Opaque
# stringData:
#   token: "some_hugging_face_token"
# ---
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: llama-cpp
#   namespace: "{{ .Values.applicationsNamespace }}"
# data:
#   model.json: |
#     {
#       "models": {
#         "unsloth/gemma-4-E4B-it-qat-GGUF": {
#           "include": [
#             "*mmproj-BF16*",
#             "*UD-Q4_K_XL*"
#           ],
#           "local_dir": "/models/gemma-4-E4B-it",
#           "revision": "main"
#         }
#       }
#     }
#   preset.ini: |
#     version = 1
#     [*]
#     flash-attn = on
#     top-p = 0.95
#     temp = 1.0
#     cache-type-k = q8_0
#     cache-type-v = q8_0
#     batch-size = 512
#     ubatch-size = 512
#     parallel = 1
#     fit-target = 256
#     ; n-gpu-layers = all
#     [gemma4-4B]
#     model = /models/gemma-4-E4B-it/gemma-4-E4B-it-qat-UD-Q4_K_XL.gguf
#     mmproj = /models/gemma-4-E4B-it/mmproj-BF16.gguf
#     fit-ctx = 128000
#     top-k = 64
#     frequency-penalty = 1.5
#     split-mode = none

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: llama-cpp
  namespace: "{{ .Values.applicationsNamespace }}"
spec:
  chart: llama-cpp
  repo: https://arch-anes.github.io/charts
  version: 1.0.11
  targetNamespace: "{{ .Values.applicationsNamespace }}"
  # default-values: https://github.com/arch-anes/charts/blob/main/charts/llama-cpp/values.yaml
  values:
    {{- $gpuVendor := .Values.applications.llama_cpp.gpu_vendor }}
    {{- with $gpuVendor }}
    gpu:
      enabled: true
      type: {{ . }}
      useVulkan: {{ $.Values.applications.llama_cpp.use_vulkan }}
    {{- end }}
    initContainerImage:
      repository: ghcr.io/arch-anes/hf-pkg
      tag: 0.1.0
      pullPolicy: IfNotPresent
    workload:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        podSpec:
          initContainers:
            download-models:
              enabled: true
              type: init
              imageSelector: initContainerImage
              command: ["hf", "pkg", "install", "-f", "/config/model.json"]
              env:
                HF_TOKEN:
                  secretKeyRef:
                    name: hugging-face
                    key: token
                    expandObjectName: false
          containers:
            main:
              env:
                LLAMA_ARG_WEBUI: disabled
                LLAMA_ARG_MODELS_MAX: "{{ .Values.applications.llama_cpp.max_loaded_models }}"
                LLAMA_ARG_MODELS_PRESET: /config/preset.ini
                HF_TOKEN:
                  secretKeyRef:
                    name: hugging-face
                    key: token
                    expandObjectName: false
              resources:
                requests:
                  memory: 1Gi
                  cpu: 1000m
                limits:
                  cpu: null
                  memory: null
                  {{- if eq $gpuVendor "intel" }}
                    {{- if not (include "app.enabled" (list . "intel_gpu")) }}
                      {{- fail "Intel GPU is selected for llama.cpp but intel_gpu is not enabled" }}
                    {{- end }}
                  gpu.intel.com/i915: {{ .Values.applications.llama_cpp.gpu_count }}
                  {{- else if eq $gpuVendor "intel_xe" }}
                    {{- if not (include "app.enabled" (list . "intel_gpu")) }}
                      {{- fail "Intel GPU is selected for llama.cpp but intel_gpu is not enabled" }}
                    {{- end }}
                  gpu.intel.com/xe: {{ .Values.applications.llama_cpp.gpu_count }}
                  {{- else if eq $gpuVendor "nvidia" }}
                    {{- if not (include "app.enabled" (list . "nvidia_gpu")) }}
                      {{- fail "NVIDIA GPU is selected for llama.cpp but nvidia_gpu is not enabled" }}
                    {{- end }}
                  nvidia.com/gpu: {{ .Values.applications.llama_cpp.gpu_count }}
                  {{- else if eq $gpuVendor "amd" }}
                    {{- if not (include "app.enabled" (list . "amd_gpu")) }}
                      {{- fail "AMD GPU is selected for llama.cpp but amd_gpu is not enabled" }}
                    {{- end }}
                  amd.com/gpu: {{ .Values.applications.llama_cpp.gpu_count }}
                  {{- else if $gpuVendor }}
                    {{- fail (printf "Unknown GPU vendor '%s' selected for llama.cpp" $gpuVendor) }}
                  {{- end }}
          tolerations:
            - key: "dedicated"
              operator: Equal
              value: "ai"
              effect: "NoSchedule"
      embeddings:
        enabled: true
        primary: false
        type: Deployment
        podSpec:
          containers:
            embeddings:
              enabled: true
              primary: true
              env:
                HOME: /tmp
                LLAMA_ARG_WEBUI: disabled
                LLAMA_ARG_HF_REPO: "nomic-ai/nomic-embed-text-v1.5-GGUF:Q4_K_M"
                LLAMA_ARG_EMBEDDINGS: "1"
                LLAMA_ARG_MODELS_MAX: "1"
                LLAMA_ARG_N_PARALLEL: "1"
                LLAMA_ARG_UBATCH: "8192"
                LLAMA_ARG_BATCH: "8192"
                LLAMA_ARG_CTX_SIZE: "8192"
                LLAMA_ARG_ROPE_SCALING_TYPE: "yarn"
                LLAMA_ARG_ROPE_FREQ_SCALE: ".75"
                HF_TOKEN:
                  secretKeyRef:
                    name: hugging-face
                    key: token
                    expandObjectName: false
              resources:
                requests:
                  memory: 512Mi
                  cpu: 100m
                limits:
                  cpu: null
                  memory: null
              probes:
                readiness:
                  enabled: true
                  type: http
                  path: /health
                  port: 8080
                liveness:
                  enabled: true
                  type: http
                  path: /health
                  port: 8080
                startup:
                  enabled: true
                  type: http
                  path: /health
                  port: 8080
    service:
      embeddings:
        enabled: true
        type: ClusterIP
        targetSelector: embeddings
        ports:
          http:
            enabled: true
            port: 8080
            targetPort: 8080
    persistence:
      models:
        type: pvc
        storageClass: local-path-persistent-namespaced
        targetSelector:
          main:
            download-models:
              mountPath: /models
            main:
              mountPath: /models
      config:
        enabled: true
        type: configmap
        objectName: llama-cpp
        expandObjectName: false
        targetSelector:
          main:
            download-models:
              mountPath: /config
            main:
              mountPath: /config
{{- end }}
