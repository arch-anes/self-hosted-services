# code: language=ansible
---

- name: Setup firewall
  ansible.builtin.import_role:
    name: firewall
  vars:
    firewall_rules:
      - { to_port: 80, proto: tcp, rule: allow, comment: "Allow HTTP" }
      - { to_port: 443, proto: tcp, rule: allow, comment: "Allow HTTPS" }
      - { to_port: 8080, proto: tcp, rule: allow, comment: "Allow traefik" }
      - { to_port: 30778, proto: any, rule: allow, comment: "Allow Minecraft Bedrock" }
  when: not (skip_firewall_setup or manifest_only_setup)

- name: Fetch list of nodes
  ansible.builtin.shell: "set -o pipefail && kubectl get nodes -o json | jq -c '[.items[].metadata.annotations.\"k3s.io/internal-ip\"] | sort'"
  args:
    executable: /usr/bin/bash
  when:
    - k3s_control_node is defined
    - k3s_control_node
  run_once: true
  changed_when: false
  become: true
  register: k3s_agent_nodes_endpoints

- name: Fetch list of control nodes
  ansible.builtin.shell: "set -o pipefail && kubectl get nodes -o json | jq -c '[.items[].metadata | select(.labels.\"node-role.kubernetes.io/control-plane\") | .annotations.\"k3s.io/internal-ip\"] | sort'"
  args:
    executable: /usr/bin/bash
  when:
    - k3s_control_node is defined
    - k3s_control_node
  run_once: true
  changed_when: false
  become: true
  register: k3s_control_nodes_endpoints

- name: Deploy manifests
  when:
    - k3s_control_node is defined
    - k3s_control_node
  block:
    - name: Deploy helm chart
      ansible.builtin.include_tasks: apply_helm_chart.yml

- name: Extract Kubernetes Dashboard password
  ansible.builtin.include_tasks: extract_dashboard_password.yml
  # Workaround for https://github.com/ansible/ansible/issues/11496
  when:
    - display_k8s_dashboard_password
    - k3s_control_node is defined
    - k3s_control_node
