# code: language=ansible
---

- name: Setup ZFS
  become: true
  when: ansible_distribution == 'Ubuntu' and ansible_module_container_type == ''
  block:
    - name: Generate zfs-load-key service file
      ansible.builtin.template:
        src: zfs-load-key.service.j2
        dest: /etc/systemd/system/zfs-load-key.service
        mode: '644'

    - name: Enable zfs-load-key service
      ansible.builtin.systemd:
        name: zfs-load-key.service
        enabled: true
        state: started

    - name: Calculate ZFS ARC limit (25% of RAM)
      ansible.builtin.set_fact:
        zfs_arc_max_bytes: "{{ (ansible_memtotal_mb * 1024 * 1024 * 0.25) | int }}"

    - name: Limit ZFS ARC size in modprobe config
      ansible.builtin.copy:
        dest: /etc/modprobe.d/zfs.conf
        content: "options zfs zfs_arc_max={{ zfs_arc_max_bytes }}"
        mode: '0644'

    - name: Apply ZFS ARC limit immediately
      ansible.builtin.copy:
        dest: /sys/module/zfs/parameters/zfs_arc_max
        content: "{{ zfs_arc_max_bytes }}"
        mode: '0644'
        unsafe_writes: true

- name: Setup Sanoid
  become: true
  when: ansible_distribution == 'Ubuntu' and ansible_module_container_type == ''
  block:
    - name: Create Sanoid configuration directory
      ansible.builtin.file:
        path: /etc/sanoid
        state: directory
        mode: '0755'

    - name: Get list of ZFS datasets
      ansible.builtin.command: zfs list -H -o name
      register: zfs_datasets
      changed_when: false
      failed_when: false

    - name: Generate Sanoid configuration
      ansible.builtin.template:
        src: sanoid.conf.j2
        dest: /etc/sanoid/sanoid.conf
        mode: '0644'

    - name: Enable and start Sanoid timer
      ansible.builtin.systemd:
        name: sanoid.timer
        enabled: true
        state: started
