---
- name: Setup hosts
  hosts: all
  become: yes

  roles:
    - role: weareinteractive.ufw
      vars:
        ufw_rules:
          - { to_port: 22, proto: tcp, rule: limit, comment: "Limit SSH" }
          - { to_port: 80, proto: tcp, rule: allow, comment: "Allow HTTP" }
          - { to_port: 443, proto: tcp, rule: allow, comment: "Allow HTTPS" }
          - { to_port: 53, proto: any, rule: allow, comment: "Allow DNS" }
          - { to_port: 6443, proto: tcp, rule: allow, comment: "Kubernetes API Server" }
          - { to_port: 8472, proto: udp, rule: allow, comment: "Required only for Flannel VXLAN" }
          - { to_port: 10250, proto: tcp, rule: allow, comment: "Kubelet metrics" }
          - { to_port: "2379:2380", proto: tcp, rule: allow, comment: "Required only for HA with embedded etcd" }

    - role: atosatto.docker-swarm
      vars:
        skip_repo: true
        skip_containerd: true
        skip_engine: true
        skip_cli: true
        skip_group: true
        skip_docker_py: true
        skip_docker_compose: true
